name: CI Pipeline

on:
  push:
    branches: ["**"] 
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: devops_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready 
          --health-interval 10s 
          --health-timeout 5s 
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Database Table
        run: |
          docker run --network host postgres:15-alpine sh -c "PGPASSWORD=postgres psql -h localhost -U postgres -d devops_db -c 'CREATE TABLE IF NOT EXISTS todos (id SERIAL PRIMARY KEY, title TEXT NOT NULL, completed BOOLEAN DEFAULT FALSE);'"

      - name: Install dependencies
        run: npm install
        working-directory: ./backend

      - name: Run tests
        # FIX: Dùng --forceExit và --runInBand để dứt điểm lỗi TCPWRAP
        run: npm test -- --forceExit --detectOpenHandles --runInBand
        working-directory: ./backend
        env:
          DB_HOST: localhost
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: devops_db
          DB_PORT: 5432
          NODE_ENV: test