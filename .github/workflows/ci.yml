name: CI/CD Pipeline

on:
  push:
    branches: ["main", "hoang-buu", "feature/**"]
  pull_request:
    branches: ["main", "hoang-buu"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: devops_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        working-directory: ./backend
        run: npm install

      - name: Setup DB Table
        run: |
          docker run --network host postgres:15-alpine sh -c "
          PGPASSWORD=postgres psql -h localhost -U postgres -d devops_db -c '
          CREATE TABLE IF NOT EXISTS todos (
            id SERIAL PRIMARY KEY,
            title TEXT NOT NULL,
            completed BOOLEAN DEFAULT FALSE
          );'"

      - name: Run Tests
        working-directory: ./backend
        run: npm test -- --forceExit --runInBand
        env:
          DB_HOST: localhost
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: devops_db
          DB_PORT: 5432
          NODE_ENV: test

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/devops-backend:latest

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/hoang-buu' || github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            cd /var/www/devops-project-hcm
            git checkout hoang-buu || git checkout -b hoang-buu
            git pull origin hoang-buu

            # Kill ports
            sudo fuser -k 8080/tcp || true
            sudo fuser -k 3000/tcp || true

            # Cleanup old containers
            docker-compose down --remove-orphans

            # Run new version
            docker-compose pull
            docker-compose up -d

            echo "✅ Deployment completed successfully!"

      - name: Verify Live Application
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            echo "⏳ Waiting for services..."
            sleep 10

            # Backend check
            echo "🔍 Checking Backend..."
            BACKEND_STATUS=$(curl -s http://localhost:8080/health | grep -o '"status":"healthy"' || echo "")
            if [ -z "$BACKEND_STATUS" ]; then
              echo "❌ Backend is NOT responding!"
              exit 1
            fi
            echo "✅ Backend is healthy!"

            # Frontend check
            echo "🔍 Checking Frontend..."
            FRONTEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000)
            if [ "$FRONTEND_STATUS" != "200" ]; then
              echo "❌ Frontend returned $FRONTEND_STATUS!"
              exit 1
            fi
            echo "✅ Frontend is running!"

            # Database check
            echo "🔍 Checking Database..."
            DB_CHECK=$(docker-compose exec -T postgres psql -U postgres -d devops_db -c "SELECT COUNT(*) FROM todos;" 2>&1)
            if [ $? -eq 0 ]; then
              echo "✅ Database is connected!"
            else
              echo "❌ Database connection failed!"
              exit 1
            fi

            echo "📦 Running containers:"
            docker-compose ps

            echo "🎉 All services verified successfully!"